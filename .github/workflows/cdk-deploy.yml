name: CDK Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --all-extras
      - run: make lint
      - run: make test

  synth:
    name: CDK Synth
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev, staging, prod]
    env:
      DEV_ACCOUNT_ID: ${{ secrets.DEV_ACCOUNT_ID }}
      STAGING_ACCOUNT_ID: ${{ secrets.STAGING_ACCOUNT_ID }}
      PROD_ACCOUNT_ID: ${{ secrets.PROD_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync
      - run: npm install -g aws-cdk
      - name: Synth
        env:
          CDK_ENV: ${{ matrix.env }}
        run: uv run cdk synth

  deploy-dev:
    name: Deploy to Dev
    needs: synth
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEV_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
      - run: uv sync && npm install -g aws-cdk
      - run: CDK_ENV=dev uv run cdk deploy --all --require-approval never

  deploy-staging:
    name: Deploy to Staging
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.STAGING_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
      - run: uv sync && npm install -g aws-cdk
      - run: CDK_ENV=staging uv run cdk deploy --all --require-approval never

  deploy-prod:
    name: Deploy to Prod
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PROD_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
      - run: uv sync && npm install -g aws-cdk
      - run: CDK_ENV=prod uv run cdk deploy --all --require-approval never
